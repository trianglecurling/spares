name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build:frontend

      - name: Build backend
        run: bun run build:backend

      - name: Install production backend dependencies
        run: |
          rm -rf /tmp/tccnc-backend-prod
          mkdir -p /tmp/tccnc-backend-prod
          cp backend/package.json /tmp/tccnc-backend-prod/
          cd /tmp/tccnc-backend-prod
          bun install --production --no-save

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            sudo mkdir -p /srv/tccnc-web-prod/dist /srv/tccnc-web-prod/backend
            sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /srv/tccnc-web-prod || true
          EOF

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='node_modules' \
            --exclude='.git' \
            frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }}:/srv/tccnc-web-prod/dist/

      - name: Prepare backend for deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -euo pipefail
            DEPLOY_USER="$(whoami)"
            UNIT="${{ vars.PROD_SYSTEMD_UNIT || 'tccnc-web-prod' }}"
            BACKEND="/srv/tccnc-web-prod/backend"

            sudo systemctl stop "$UNIT" || true
            sudo chown -R "$DEPLOY_USER:$DEPLOY_USER" "$BACKEND"
            sudo rm -rf "$BACKEND/node_modules" /srv/tccnc-web-prod/node_modules
            sudo rm -f "$BACKEND/bun.lock" /srv/tccnc-web-prod/bun.lock /srv/tccnc-web-prod/package.json
          EOF

      - name: Deploy backend
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            backend/dist/ backend/package.json \
            ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }}:/srv/tccnc-web-prod/backend/
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/tccnc-backend-prod/node_modules/ \
            ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }}:/srv/tccnc-web-prod/backend/node_modules/

      - name: Restart production service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -euo pipefail
            UNIT="${{ vars.PROD_SYSTEMD_UNIT || 'tccnc-web-prod' }}"
            BACKEND="/srv/tccnc-web-prod/backend"

            sudo mkdir -p "$BACKEND/data"
            sudo chown -R www-data:www-data "$BACKEND/data"
            sudo chmod 755 "$BACKEND/data"
            if [ -f "$BACKEND/.env" ]; then
              sudo chown www-data:www-data "$BACKEND/.env"
              sudo chmod 600 "$BACKEND/.env"
            fi
            sudo systemctl restart "$UNIT"
          EOF
