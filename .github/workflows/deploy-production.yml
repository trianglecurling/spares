name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build:frontend

      - name: Build backend
        run: bun run build:backend

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            sudo mkdir -p /srv/tccnc-web/dist /srv/tccnc-web/backend
            sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /srv/tccnc-web || true
          EOF

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='node_modules' \
            --exclude='.git' \
            frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }}:/srv/tccnc-web/dist/

      - name: Deploy backend
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='node_modules' \
            --exclude='.git' \
            backend/dist/ backend/package.json \
            ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }}:/srv/tccnc-web/backend/

      - name: Install production dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.PROD_HOST }} << EOF
            set -euo pipefail
            cd /srv/tccnc-web/backend
            sudo chown -R "${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }}" /srv/tccnc-web/backend
            sudo rm -rf node_modules
            sudo rm -f bun.lock ../bun.lock ../package.json
            if [ -f bun.lock ] || [ -f ../bun.lock ]; then
              echo "Stale bun.lock could not be removed; aborting."
              ls -la bun.lock ../bun.lock 2>/dev/null || true
              exit 1
            fi
            unset CI GITHUB_ACTIONS
            bun install --production --no-save
            sudo mkdir -p /srv/tccnc-web/backend/data
            sudo chown -R www-data:www-data /srv/tccnc-web/backend
            sudo chmod 755 /srv/tccnc-web/backend/data
            sudo systemctl restart ${{ vars.PROD_SYSTEMD_UNIT || 'tccnc-web-production' }}
          EOF
